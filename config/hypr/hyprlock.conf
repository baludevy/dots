source = /home/balu/.config/colors/colors.conf

background {
    monitor =
    path = screenshot
    blur_passes = 3
    blur_size = 8
    color = $base
}

input-field {
    monitor =
    size = 250, 50
    outline_thickness = 2
    dots_size = 0.33 
    dots_spacing = 0.15
    dots_center = true
    outer_color = $surface0
    inner_color = $base
    font_color = $text
    fade_on_empty = true
    placeholder_text = password...
    hide_input = false
    position = 0, -20
    halign = center
    valign = center
    rounding = 6
}

label {
    monitor =
    text = $TIME
    color = $text
    font_size = 64
    font_family = JetBrainsMono Nerd Font
    position = 0, 80
    halign = center
    valign = center
}
